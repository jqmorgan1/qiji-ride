name: shanghai_ride
description: Shanghai Ride - 上海骑行社交 App (Strava + Komoot + Zwift 风格)
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # 状态管理
  flutter_riverpod: ^2.4.0
  
  # 导航
  go_router: ^13.0.0
  
  # 地图（模拟，实际用高德）
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # 定位
  geolocator: ^10.1.0
  
  # 网络
  http: ^1.1.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 图片
  cached_network_image: ^3.3.0
  image_picker: ^1.0.5
  
  # 图表
  fl_chart: ^0.65.0
  
  # 时间格式化
  intl: ^0.18.1
  
  # 分享
  share_plus: ^7.2.1
  
  # 权限
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
